<div class="tool-container">
  <div class="tool-header">
    <h1><span class="tool-icon">&#123; &#125;</span> JSON 格式化</h1>
    <p>格式化、壓縮、驗證 JSON 資料</p>
  </div>

  <div class="card">
    <div class="tool-actions">
      <button class="btn btn-primary" (click)="format()">格式化</button>
      <button class="btn btn-secondary" (click)="minify()">壓縮</button>
      <button class="btn btn-secondary" (click)="loadSample()">載入範例</button>
      <button class="btn btn-ghost" (click)="clear()">清除</button>
      <div class="indent-control">
        <label>縮排</label>
        <select class="form-control" [ngModel]="indentSize()" (ngModelChange)="indentSize.set($event)">
          <option [value]="2">2 空格</option>
          <option [value]="4">4 空格</option>
        </select>
      </div>
    </div>
  </div>

  <div class="io-grid">
    <div class="form-group">
      <label>輸入 JSON</label>
      <textarea
        class="form-control mono"
        rows="16"
        placeholder='{"key": "value"}'
        [ngModel]="input()"
        (ngModelChange)="input.set($event)"
      ></textarea>
    </div>
    <div class="form-group">
      <div class="output-label">
        <label>輸出結果</label>
        @if (output()) {
          <button class="btn btn-ghost btn-sm" (click)="copy()">複製</button>
        }
      </div>
      @if (error()) {
        <div class="error-box">⚠ {{ error() }}</div>
      } @else {
        <textarea class="form-control mono" rows="16" readonly [value]="output()" placeholder="結果將顯示在這裡"></textarea>
      }
    </div>
  </div>
</div>

@if (showToast()) {
  <div class="copy-toast">✓ 已複製到剪貼簿</div>
}
