<div class="tool-container">
  <div class="tool-header">
    <h1><span class="tool-icon">🎨</span> 色彩轉換</h1>
    <p>HEX、RGB、HSL 格式互相轉換</p>
  </div>

  <div class="color-layout">
    <div class="color-preview-card card">
      <div class="color-swatch" [style.background]="hex()"></div>
      <input
        class="color-native"
        type="color"
        [value]="hex()"
        (input)="hex.set($any($event.target).value)"
      />
      <span class="color-hint">點擊色塊選色</span>
    </div>

    <div class="color-values card">
      <div class="color-row">
        <span class="color-label">HEX</span>
        <input
          class="form-control mono"
          type="text"
          [value]="hex()"
          (change)="onHexInput($any($event.target).value)"
          maxlength="7"
        />
        <button class="btn btn-secondary btn-sm" (click)="copy(hex(), 'HEX')">複製</button>
      </div>

      <div class="color-row">
        <span class="color-label">RGB</span>
        <div class="rgb-inputs">
          <input class="form-control mono" type="number" min="0" max="255"
            [value]="rgb().r" (change)="onRgbInput('r', +$any($event.target).value)" />
          <input class="form-control mono" type="number" min="0" max="255"
            [value]="rgb().g" (change)="onRgbInput('g', +$any($event.target).value)" />
          <input class="form-control mono" type="number" min="0" max="255"
            [value]="rgb().b" (change)="onRgbInput('b', +$any($event.target).value)" />
        </div>
        <button class="btn btn-secondary btn-sm" (click)="copy(rgbString, 'RGB')">複製</button>
      </div>

      <div class="color-row">
        <span class="color-label">HSL</span>
        <input class="form-control mono" type="text" readonly [value]="hslString" />
        <button class="btn btn-secondary btn-sm" (click)="copy(hslString, 'HSL')">複製</button>
      </div>
    </div>
  </div>
</div>

@if (showToast()) {
  <div class="copy-toast">✓ 已複製 {{ toastMsg() }}</div>
}
